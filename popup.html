<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HXLoLi-NaGaMe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #161b22, #1c2431);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #30363d;
    }

    .header-icon {
      font-size: 28px;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f0f6fc;
    }

    .header-text p {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }

    .content {
      padding: 16px 20px;
    }

    /* 状态栏 */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(56, 139, 253, 0.06);
      border: 1px solid rgba(56, 139, 253, 0.2);
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #3fb950;
      box-shadow: 0 0 6px rgba(63, 185, 80, 0.5);
    }

    .status-dot.inactive {
      background: #f85149;
      box-shadow: 0 0 6px rgba(248, 81, 73, 0.3);
    }

    .status-dot.warning {
      background: #d29922;
      box-shadow: 0 0 6px rgba(210, 153, 34, 0.3);
    }

    .status-text {
      font-size: 12px;
      color: #8b949e;
    }

    /* 用户卡片 */
    .user-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #21262d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .user-status {
      font-size: 11px;
      color: #3fb950;
      margin-top: 2px;
    }

    .user-status.warning {
      color: #d29922;
    }

    .logout-btn {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: rgba(248, 81, 73, 0.1);
      border-color: rgba(248, 81, 73, 0.4);
      color: #f85149;
    }

    /* GitHub 授权按钮 */
    .auth-section {
      margin-bottom: 14px;
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: #238636;
      border: 1px solid rgba(240, 246, 252, 0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .auth-btn:hover {
      background: #2ea043;
    }

    .auth-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .auth-btn .gh-icon {
      width: 20px;
      height: 20px;
    }

    /* Device Flow 提示 */
    .device-flow-panel {
      display: none;
      padding: 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-bottom: 14px;
      text-align: center;
    }

    .device-flow-panel.show {
      display: block;
    }

    .device-flow-panel .label {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 8px;
    }

    .user-code {
      font-size: 28px;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      color: #58a6ff;
      letter-spacing: 4px;
      padding: 10px;
      background: rgba(56, 139, 253, 0.08);
      border: 1px dashed rgba(56, 139, 253, 0.3);
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .user-code:hover {
      background: rgba(56, 139, 253, 0.15);
    }

    .user-code.copied {
      border-color: #3fb950;
      color: #3fb950;
    }

    .device-flow-panel .hint {
      font-size: 11px;
      color: #8b949e;
      line-height: 1.5;
    }

    .device-flow-panel .hint a {
      color: #58a6ff;
      text-decoration: none;
    }

    .device-flow-panel .hint a:hover {
      text-decoration: underline;
    }

    .device-flow-panel .spinner-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 11px;
      color: #d29922;
    }

    .mini-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid #30363d;
      border-top-color: #d29922;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 备用方案: Token 输入 */
    .token-section {
      margin-bottom: 14px;
    }

    .collapse-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 0;
      cursor: pointer;
      font-size: 12px;
      color: #8b949e;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .collapse-header:hover {
      color: #58a6ff;
    }

    .collapse-arrow {
      transition: transform 0.2s;
      font-size: 10px;
    }

    .collapse-arrow.open {
      transform: rotate(90deg);
    }

    .collapse-body {
      display: none;
      padding-top: 8px;
    }

    .collapse-body.show {
      display: block;
    }

    .token-input {
      width: 100%;
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .token-input:focus {
      border-color: #58a6ff;
    }

    .token-input::placeholder {
      color: #484f58;
    }

    .token-submit {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .token-submit:hover {
      background: #30363d;
    }

    .token-hint {
      font-size: 10.5px;
      color: #484f58;
      margin-top: 6px;
      line-height: 1.4;
    }

    .token-hint a {
      color: #58a6ff;
      text-decoration: none;
    }

    /* 开关 */
    .switch-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .switch-label {
      font-size: 13px;
      color: #e6edf3;
    }

    .switch {
      position: relative;
      width: 42px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #30363d;
      border-radius: 22px;
      transition: 0.3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .switch input:checked + .slider {
      background: #238636;
    }

    .switch input:checked + .slider:before {
      transform: translateX(20px);
    }

    /* 按钮组 */
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
    }

    .btn-secondary:hover {
      background: #30363d;
    }

    /* 安全提示 */
    .security-info {
      padding: 8px 12px;
      background: rgba(63, 185, 80, 0.06);
      border: 1px solid rgba(63, 185, 80, 0.15);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 11px;
      color: #8b949e;
      line-height: 1.5;
    }

    .security-info strong {
      color: #3fb950;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #3fb950;
      color: #0d1117;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      transition: transform 0.3s ease;
      z-index: 100;
      max-width: 90%;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .footer {
      padding: 10px 20px;
      border-top: 1px solid #21262d;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .footer a {
      font-size: 11px;
      color: #484f58;
      text-decoration: none;
    }

    .footer a:hover {
      color: #58a6ff;
    }

    /* 隐藏区域 */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🔐</span>
    <div class="header-text">
      <h1>HXLoLi-NaGaMe</h1>
      <p>眺め · GitHub 授权解密 · v3</p>
    </div>
  </div>

  <div class="content">
    <!-- 状态栏 -->
    <div class="status-bar">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">加载中...</span>
    </div>

    <!-- 已登录: 用户信息 -->
    <div class="user-card hidden" id="userCard">
      <div class="user-avatar" id="userAvatar">👤</div>
      <div class="user-info">
        <div class="user-name" id="userName">-</div>
        <div class="user-status" id="userKeyStatus">-</div>
      </div>
      <button class="logout-btn" id="logoutBtn">登出</button>
    </div>

    <!-- 未登录: GitHub 授权 -->
    <div class="auth-section" id="authSection">
      <button class="auth-btn" id="authBtn">
        <svg class="gh-icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        通过 GitHub 授权
      </button>
    </div>

    <!-- Device Flow 面板 -->
    <div class="device-flow-panel" id="deviceFlowPanel">
      <div class="label">请在 GitHub 页面输入以下验证码</div>
      <div class="user-code" id="userCode" title="点击复制">-</div>
      <div class="hint">
        点击验证码可复制，然后前往
        <a href="#" id="verificationLink" target="_blank">GitHub 验证页面</a>
        输入
      </div>
      <div class="spinner-line">
        <div class="mini-spinner"></div>
        <span id="pollStatus">等待授权中...</span>
      </div>
    </div>

    <!-- 安全说明 -->
    <div class="security-info">
      🛡️ <strong>安全模型</strong>: 你的 GitHub Token 仅用于读取私有仓库 <code>HXLoLi-imouto</code> 中的 RSA 私钥。
      解密完全在本地完成，零网络传输密文。
    </div>

    <!-- 开关 -->
    <div class="switch-row">
      <span class="switch-label">自动解锁受保护页面</span>
      <label class="switch">
        <input type="checkbox" id="autoDecryptSwitch">
        <span class="slider"></span>
      </label>
    </div>

    <div class="switch-row">
      <span class="switch-label">启用插件</span>
      <label class="switch">
        <input type="checkbox" id="enableSwitch">
        <span class="slider"></span>
      </label>
    </div>

    <!-- 按钮 -->
    <div class="btn-group">
      <button class="btn btn-secondary" id="refreshKeyBtn">🔑 刷新私钥</button>
      <button class="btn btn-secondary" id="refreshPageBtn">🔄 刷新页面</button>
    </div>

    <!-- 备用: Token 输入 -->
    <div class="token-section">
      <button class="collapse-header" id="tokenToggle">
        <span class="collapse-arrow" id="tokenArrow">▶</span>
        备用方案: 手动输入 GitHub Token
      </button>
      <div class="collapse-body" id="tokenBody">
        <input type="password" class="token-input" id="tokenInput"
               placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
               autocomplete="off" spellcheck="false">
        <button class="token-submit" id="tokenSubmit">验证并保存 Token</button>
        <div class="token-hint">
          创建 <a href="https://github.com/settings/tokens?type=beta" target="_blank">Fine-grained PAT</a>
          → 仅授权 <code>HXLoLi-imouto</code> 仓库的 Contents 读取权限
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/HengXin666/HXLoLi" target="_blank">HXLoLi Blog</a>
    <a href="https://github.com/HengXin666/HXLoLi-NaGaMe" target="_blank">插件源码</a>
  </div>

  <div class="toast" id="toast">✅ 操作完成</div>

  <script src="browser-polyfill.js"></script>
  <script src="popup.js"></script>
</body>
</html>
